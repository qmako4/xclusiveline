name = "xclusiveline-images"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# R2 bucket that holds product images.
# Create it first:  wrangler r2 bucket create xclusiveline-images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "xclusiveline-images"

# D1 database (the whole backend: users, products, orders, wallet).
# Create it first:  wrangler d1 create xclusiveline
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "xclusiveline"
database_id = "b6f5a241-9754-4e99-b731-c6299d0a239a"

[vars]
# Public base URL where images are served from (R2 public/custom domain). No trailing slash.
PUBLIC_BASE = "https://pub-0c603d33592f4c888141122b8c344962.r2.dev"
# Set to your site origin in production, e.g. https://qmako4.github.io
ALLOWED_ORIGIN = "*"
# "sandbox" while testing, "live" when ready to take real payments.
PAYPAL_ENV = "sandbox"
# Lets the standalone Photo Studio admin page manage products without a storefront login.
OPEN_ADMIN_ACCESS = "true"

# Secrets (do NOT put these here — set with `wrangler secret put <NAME>`):
#   JWT_SECRET          long random string for signing sessions
#   PAYPAL_CLIENT_ID    from your PayPal developer app
#   PAYPAL_SECRET       from your PayPal developer app
