name = "xclusiveline-photo-studio"
main = "src/worker.js"
compatibility_date = "2026-06-01"

assets = { directory = "./public", binding = "ASSETS" }

[[r2_buckets]]
binding = "XCLUSIVELINE_MEDIA"
bucket_name = "xclusiveline-media"
preview_bucket_name = "xclusiveline-media-preview"

[[queues.producers]]
binding = "XCLUSIVELINE_STUDIO_QUEUE"
queue = "xclusiveline-photo-studio-jobs"

[[queues.consumers]]
queue = "xclusiveline-photo-studio-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 1
max_concurrency = 1
retry_delay = 30

[vars]
XCLUSIVELINE_OPENAI_IMAGE_MODEL = "gpt-image-2"
XCLUSIVELINE_IMAGE_SIZE = "1200x1600"
XCLUSIVELINE_KEEP_CROP_IMAGE_SIZE = "auto"
XCLUSIVELINE_IMAGE_QUALITY = "high"
XCLUSIVELINE_OUTPUT_FORMAT = "jpeg"
XCLUSIVELINE_OUTPUT_COMPRESSION = "95"
XCLUSIVELINE_REQUIRE_ADMIN_TOKEN = "false"
XCLUSIVELINE_MAX_BULK_IMAGES = "24"
XCLUSIVELINE_YUPOO_IMPORT_LIMIT = "24"
XCLUSIVELINE_R2_PREFIX = "photo-studio/"
XCLUSIVELINE_ALLOWED_ORIGINS = "http://localhost:8787,http://localhost:3000,http://127.0.0.1:3000,http://127.0.0.1:8080,https://qmako4.github.io,https://xclusiveline.com,https://www.xclusiveline.com"
XCLUSIVELINE_BACKGROUND_URL = "https://qmako4.github.io/xclusiveline/assets/xclusiveline-studio-background.png"
