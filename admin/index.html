<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=../#admin">
  <title>XCLUSIVELINE Admin</title>
  <style>
    :root {
      --yellow: #F5A800;
      --black: #0A0A0A;
      --white: #FAFAFA;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--black);
      color: var(--white);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid rgba(250, 250, 250, .14);
      padding: 28px;
      text-align: center;
      background: rgba(250, 250, 250, .04);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-weight: 900;
      letter-spacing: .05em;
    }

    .logo::before {
      content: "";
      width: 6px;
      height: 34px;
      background: var(--yellow);
      display: block;
    }

    p {
      color: rgba(250, 250, 250, .72);
      margin: 0 0 18px;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 46px;
      padding: 0 18px;
      background: var(--yellow);
      color: var(--black);
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
  <script>
    window.location.replace('../#admin');
  </script>
</head>
<body>
  <main>
    <div class="logo">XCLUSIVELINE</div>
    <p>Opening the product admin...</p>
    <a href="../#admin">Open Admin</a>
  </main>
</body>
</html>
